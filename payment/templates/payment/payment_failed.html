{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed - ShopEase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #d9e8ff, #f0faff, #e0f7ff, #c9ecff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .failed-container {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 480px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .failed-icon {
            font-size: 5rem;
            color: #dc3545;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 15px;
        }
        p {
            color: #555;
            font-size: 1.1rem;
        }
        .btn {
            background: #007bff;
            color: white;
            padding: 14px 35px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            margin-top: 25px;
            font-weight: 600;
        }
        .btn-retry {
            background: #00a651;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="failed-container">
        <div class="failed-icon">
            <i class="fas fa-times-circle"></i>
        </div>
        <h1>Payment Failed</h1>
        <p>Sorry, your M-Pesa payment could not be completed.</p>
        <p>Please try again or use a different payment method.</p>

        <div style="margin-top: 25px;">
            <a href="{% url 'payment:mpesa_payment' order.order_number %}" class="btn btn-retry">
                <i class="fas fa-redo"></i> Try Again
            </a>
            <a href="{% url 'checkout:my_orders' %}" class="btn">
                Back to My Orders
            </a>
        </div>
    </div>
</body>
</html>
```
