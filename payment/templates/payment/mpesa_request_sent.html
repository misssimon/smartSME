{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Request Sent - ShopEase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #d9e8ff, #f0faff, #e0f7ff, #c9ecff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .confirmation-container {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .icon {
            font-size: 4.5rem;
            color: #00a651;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 15px;
        }
        .order-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin: 25px 0;
        }
        .instruction {
            color: #555;
            font-size: 1.05rem;
            line-height: 1.6;
        }
        .btn {
            background: #007bff;
            color: white;
            padding: 14px 30px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="confirmation-container">
        <div class="icon">
            <i class="fas fa-mobile-alt"></i>
        </div>
        <h1>Payment Request Sent!</h1>
        
        <div class="order-info">
            <p><strong>Order:</strong> #{{ order.order_number }}</p>
            <p><strong>Amount:</strong> KES {{ order.total }}</p>
        </div>

        <div class="instruction">
            <p>Please check your phone and enter your <strong>M-Pesa PIN</strong> to complete the payment.</p>
            <p>The request will expire in a few minutes.</p>
        </div>

        <a href="{% url 'checkout:my_orders' %}" class="btn">
            <i class="fas fa-list"></i> Back to My Orders
        </a>
    </div>
</body>
</html>
