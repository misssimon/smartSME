\{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SmartSME{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fc;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: #fff;
            box-shadow: 2px 0 12px rgba(0,0,0,0.1);
            padding: 20px 0;
            overflow-y: auto;
            z-index: 1000;
        }
        .logo {
            padding: 0 25px 25px;
            font-size: 1.9rem;
            font-weight: bold;
            color: #007bff;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            padding: 14px 25px;
            color: #555;
            text-decoration: none;
            transition: all 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            background: #f0f7ff;
            color: #007bff;
            border-left: 4px solid #007bff;
        }
        .nav-link i { 
            width: 24px; 
            margin-right: 12px; 
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 30px;
            min-height: 100vh;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .sidebar { width: 80px; }
            .sidebar .nav-link span { display: none; }
            .main-content { margin-left: 80px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">SmartSME</div>
        
        <a href="{% url 'dashboard:buyer_dashboard' %}" class="nav-link {% if request.path == '/dashboard/buyer/' %}active{% endif %}">
            <i class="fas fa-home"></i> <span>Home</span>
        </a>
        <a href="{% url 'dashboard:marketplace' %}" class="nav-link {% if 'marketplace' in request.path %}active{% endif %}">
            <i class="fas fa-store"></i> <span>Marketplace</span>
        </a>
        <a href="{% url 'dashboard:view_cart' %}" class="nav-link">
            <i class="fas fa-shopping-cart"></i> <span>Cart</span>
        </a>
        <a href="{% url 'checkout:my_orders' %}" class="nav-link">
            <i class="fas fa-receipt"></i> <span>My Orders</span>
        </a>
        <a href="{% url 'checkout:track_order' %}" class="nav-link">
            <i class="fas fa-truck"></i> <span>Track Order</span>
        </a>
        <a href="{% url 'dashboard:profile' %}" class="nav-link">
            <i class="fas fa-user"></i> <span>Profile</span>
        </a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
