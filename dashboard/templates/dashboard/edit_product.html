{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - smartSME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #d9e8ff, #f0faff, #e0f7ff, #c9ecff);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .form-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
        }
        h1 { color: #007bff; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
        }
        .btn {
            background: #007bff;
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1><i class="fas fa-edit"></i> Edit Product</h1>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" value="{{ product.name }}" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4">{{ product.description }}</textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Price per Unit (KES)</label>
                    <input type="number" step="0.01" name="price_per_unit" value="{{ product.price_per_unit }}" required>
                </div>
                <div class="form-group">
                    <label>Unit</label>
                    <select name="unit" required>
                        <option value="kg" {% if product.unit == 'kg' %}selected{% endif %}>Kilogram (kg)</option>
                        <option value="g" {% if product.unit == 'g' %}selected{% endif %}>Gram (g)</option>
                        <option value="liter" {% if product.unit == 'liter' %}selected{% endif %}>Liter</option>
                        <option value="piece" {% if product.unit == 'piece' %}selected{% endif %}>Piece</option>
                        <option value="bunch" {% if product.unit == 'bunch' %}selected{% endif %}>Bunch</option>
                        <option value="crate" {% if product.unit == 'crate' %}selected{% endif %}>Crate</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Quantity in Stock</label>
                    <input type="number" name="quantity_in_stock" value="{{ product.quantity_in_stock }}" required>
                </div>
                <div class="form-group">
                    <label>Discount (%)</label>
                    <input type="number" name="discount_percentage" value="{{ product.discount_percentage }}" min="0" max="100">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="date" name="expiry_date" value="{{ product.expiry_date|date:'Y-m-d' }}">
                </div>
                <div class="form-group">
                    <label>Ideal Temperature</label>
                    <input type="text" name="ideal_temperature" value="{{ product.ideal_temperature }}">
                </div>
            </div>

            <div class="form-group">
                <label>Specifications</label>
                <textarea name="specifications" rows="3">{{ product.specifications }}</textarea>
            </div>

            <div class="form-group">
                <label>Product Image (Leave empty to keep current)</label>
                <input type="file" name="image" accept="image/*">
                {% if product.image %}
                    <p style="margin-top:8px; font-size:0.9rem; color:#666;">
                        Current: <a href="{{ product.image.url }}" target="_blank">View Image</a>
                    </p>
                {% endif %}
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-save"></i> Update Product
            </button>
        </form>
    </div>
</body>
</html>
