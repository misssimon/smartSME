{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product - smartSME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #007bff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #d9e8ff, #f0faff, #e0f7ff, #c9ecff);
            min-height: 100vh;
            margin: 0;
            padding: 20px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-container {
            max-width: 720px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px 30px;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.85rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 16px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        small {
            color: #666;
            display: block;
            margin-top: 8px;
        }

        /* Responsive */
        @media (min-width: 576px) {
            .row {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 30px 22px;
            }
            
            h1 {
                font-size: 1.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1><i class="fas fa-plus-circle"></i> Add New Product</h1>
       
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
           
            <div class="form-group">
                <label>Product Name <span style="color:red;">*</span></label>
                <input type="text" name="name" placeholder="e.g. Fresh Tomatoes" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4" 
                    placeholder="Describe your product quality, origin, farming method, etc."></textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Price per Unit (KES) <span style="color:red;">*</span></label>
                    <input type="number" step="0.01" name="price_per_unit" placeholder="120.00" required>
                </div>
                <div class="form-group">
                    <label>Unit <span style="color:red;">*</span></label>
                    <select name="unit" required>
                        <option value="kg">Kilogram (kg)</option>
                        <option value="g">Gram (g)</option>
                        <option value="liter">Liter</option>
                        <option value="piece">Piece</option>
                        <option value="bunch">Bunch</option>
                        <option value="crate">Crate</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Quantity in Stock <span style="color:red;">*</span></label>
                    <input type="number" name="quantity_in_stock" value="0" min="0" required>
                </div>
                <div class="form-group">
                    <label>Discount (%) </label>
                    <input type="number" name="discount_percentage" value="0" min="0" max="100">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Expiry Date (Optional)</label>
                    <input type="date" name="expiry_date">
                </div>
                <div class="form-group">
                    <label>Ideal Temperature (Optional)</label>
                    <input type="text" name="ideal_temperature" placeholder="e.g. 4-8°C">
                </div>
            </div>

            <div class="form-group">
                <label>Specifications / Additional Details</label>
                <textarea name="specifications" rows="3" 
                    placeholder="Size, color, variety, certifications, etc..."></textarea>
            </div>

            <div class="form-group">
                <label>Main Product Image <span style="color:red;">*</span></label>
                <input type="file" name="image" accept="image/*" required>
                
                <label style="margin-top: 20px;">Additional Images (Varieties / Details)</label>
                <input type="file" name="sub_images" accept="image/*" multiple>
                <small>Upload up to 5 extra photos showing different angles or varieties.</small>
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-save"></i> Add Product to Marketplace
            </button>
        </form>
    </div>
</body>
</html>
